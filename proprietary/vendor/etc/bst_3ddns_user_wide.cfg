ISO100
Y_NR_Level=10;	range=[0,100]				//Y通道去噪强度
Y_NR_Level_Portrait=10;	range=[0,100]		//人像场景Y通道去噪强度
UV_NR_Level=14;	range=[0,100]               //UV通道去噪强度
HF_AddBackY=63;	range=[0,100]               //Y噪声加回（高频）
MF_AddBackY=50;	range=[0,100]               //Y噪声加回（中频）
LF_AddBackY=50;	range=[0,100]               //Y噪声加回（低频）
HF_AddBackY_Portrait=63;	range=[0,100]   //人像场景Y噪声加回（高频）
MF_AddBackY_Portrait=50;	range=[0,100]   //人像场景Y噪声加回（中频）
LF_AddBackY_Portrait=50;	range=[0,100]   //人像场景Y噪声加回（低频）
HF_AddBackUV=0;	range=[0,100]               //UV噪声加回（高频）
MF_AddBackUV=0;	range=[0,100]               //UV噪声加回（中频）
LF_AddBackUV=0;	range=[0,100]               //UV噪声加回（低频）
Satutation_Gain=50;	range=[0,100]			//饱和度增益，=100饱和度不变，>100增加，<100减少
Contrast_Gain=0;	range=[0,100]			//对比度增益，=0对比度不变，>0增加
Brightness_Threshold=20;	range=[1,255]	//亮度阈值，当图像亮度小于阈值时做提亮
Brightness_Target=60;	range=[1,255]		//亮度目标，将图像提亮到该目标
Sharpen_Gain=16;	range=[0,100]			//锐化强度
Sharpen_HF=48;	range=[0,100]				//锐化高频
Sharpen_MF=64;	range=[0,100]               //锐化中频
Sharpen_LF=24;	range=[0,100]               //锐化低频

