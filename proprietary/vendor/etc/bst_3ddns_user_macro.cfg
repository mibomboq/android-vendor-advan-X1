ISO100
Y_NR_Level=7;	range=[0,100]				//Y通道去噪强度
Y_NR_Level_Portrait=7;	range=[0,100]		//人像场景Y通道去噪强度
UV_NR_Level=8;	range=[0,100]               //UV通道去噪强度
HF_AddBackY=75;	range=[0,100]               //Y噪声加回（高频）
MF_AddBackY=75;	range=[0,100]               //Y噪声加回（中频）
LF_AddBackY=63;	range=[0,100]               //Y噪声加回（低频）
HF_AddBackY_Portrait=75;	range=[0,100]   //人像场景Y噪声加回（高频）
MF_AddBackY_Portrait=75;	range=[0,100]   //人像场景Y噪声加回（中频）
LF_AddBackY_Portrait=63;	range=[0,100]   //人像场景Y噪声加回（低频）
HF_AddBackUV=0;	range=[0,100]               //UV噪声加回（高频）
MF_AddBackUV=13;	range=[0,100]               //UV噪声加回（中频）
LF_AddBackUV=25;	range=[0,100]               //UV噪声加回（低频）
Saturation_Gain=50;	range=[0,100]			//饱和度增益，=50饱和度不变，>50增加，<50减少
Contrast_Gain=0;	range=[0,100]			//对比度增益，=0对比度不变，>0增加
Brightness_Threshold=20;	range=[1,255]	//亮度阈值，当图像亮度小于阈值时做提亮
Brightness_Target=60;	range=[1,255]		//亮度目标，将图像提亮到该目标
Sharpen_PGain=26;	range=[0,100]			//锐化白边强度
Sharpen_NGain=25;	range=[0,100]			//锐化黑边强度
Sharpen_PGain_Portrait=26;	range=[0,100]	//人像场景锐化白边强度
Sharpen_NGain_Portrait=25;	range=[0,100]	//人像场景锐化黑边强度
Sharpen_HF=30;	range=[0,100]				//锐化高频
Sharpen_MF=48;	range=[0,100]               //锐化中频
Sharpen_LF=24;	range=[0,100]               //锐化低频


